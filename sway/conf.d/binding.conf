### ==========================================================================
### VARIABLES
### ==========================================================================
set $mod Mod4

set $term kitty
set $fileManager dolphin
set $browser librewolf


### ==========================================================================
### BASIC ACTIONS
### ==========================================================================
bindsym $mod+Return exec $term
bindsym $mod+q kill
bindsym $mod+e exec $fileManager

bindsym $mod+Shift+space floating toggle
bindsym $mod+f fullscreen toggle

bindsym $mod+Ctrl+Return exec rofi -show drun
bindsym $mod+a exec rofi -show window

bindsym $mod+b exec $browser
bindsym $mod+l exec swaylock

### ==========================================================================
### WAYBAR DEFAULT MODE
### ==========================================================================
bindsym $mod+Ctrl+Shift+b exec ~/.config/waybar/launch-waybar.sh --default

### ==========================================================================
### MEDIA AND HARDWARE KEYS
### ==========================================================================
bindsym XF86AudioRaiseVolume exec wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume exec wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-

bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindsym XF86MonBrightnessUp exec brightnessctl set 10%+
bindsym XF86MonBrightnessDown exec brightnessctl set 10%-

bindsym XF86WLAN exec nmcli radio wifi toggle
bindsym XF86Refresh exec wtype -k F5

### ==========================================================================
### WINDOW FOCUS MOVEMENT
### ==========================================================================
bindsym $mod+Left focus left
bindsym $mod+Right focus right
bindsym $mod+Up focus up
bindsym $mod+Down focus down

### ==========================================================================
### MONITOR FOCUS SWITCHING
### ==========================================================================
bindsym $mod+Ctrl+Left focus output left
bindsym $mod+Ctrl+Right focus output right

### ==========================================================================
### WORKSPACES (French AZERTY)
### ==========================================================================
bindsym $mod+ampersand workspace number 1
bindsym $mod+eacute workspace number 2
bindsym $mod+quotedbl workspace number 3
bindsym $mod+apostrophe workspace number 4
bindsym $mod+parenleft workspace number 5
bindsym $mod+minus workspace number 6
bindsym $mod+egrave workspace number 7
bindsym $mod+underscore workspace number 8
bindsym $mod+ccedilla workspace number 9

### ==========================================================================
### MOVE WINDOW TO WORKSPACE
### ==========================================================================
bindsym $mod+Shift+ampersand move container to workspace number 1
bindsym $mod+Shift+eacute move container to workspace number 2
bindsym $mod+Shift+quotedbl move container to workspace number 3
bindsym $mod+Shift+apostrophe move container to workspace number 4
bindsym $mod+Shift+parenleft move container to workspace number 5
bindsym $mod+Shift+minus move container to workspace number 6
bindsym $mod+Shift+egrave move container to workspace number 7
bindsym $mod+Shift+underscore move container to workspace number 8
bindsym $mod+Shift+ccedilla move container to workspace number 9

### ==========================================================================
### WORKSPACE SCROLLING
### ==========================================================================
bindsym $mod+button4 workspace prev
bindsym $mod+button5 workspace next

bindsym $mod+Shift+Left workspace prev
bindsym $mod+Shift+Right workspace next

### ==========================================================================
### HELP
### ==========================================================================
bindsym $mod+h exec ~/.config/sway/scripts/cheatsheet.sh

### ==========================================================================
### MOUSE BINDINGS
### ==========================================================================
floating_modifier $mod normal

# Move floating windows
bindsym $mod+Button1 move

# Resize floating windows
bindsym $mod+Button3 resize

### ==========================================================================
### RELOAD / EXIT
### ==========================================================================
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec swaynag \
    -t warning \
    -m 'Exit Sway?' \
    -B 'Yes' 'swaymsg exit'


### ==========================================================================
### TOOLS
### ==========================================================================   
bindsym $mod+space exec kitty --class launcher